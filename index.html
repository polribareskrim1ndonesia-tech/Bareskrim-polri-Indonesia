<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Virus Text</title>
    <script src="https://cdn.jsdelivr.net/npm/twilio@4.0.0/dist/twilio.min.js"></script>
</head>
<body>
    <h1>Send Virus Text</h1>
    <form id="messageform">
        <label for="targetPhone">Target Phone Number:</label>
        <input type="text" id="targetPhone" name="targetPhone" required>
        <br>
        <label for="message">Virus Text:</label>
        <textarea id="message" name="message" required>Your phone has been infected with a virus. Click this link to fix it: http://example.com/virus</textarea>
        <br>
        <button type="submit">Send Virus Text</button>
    </form>

    <script>
        document.getElementById('messageform').addEventListener('submit', function(e) {
            e.preventDefault();
            const targetPhone = document.getElementById('targetPhone').value;
            const message = document.getElementById('message').value;

            Twilio.Chat.Client.create().then(function(client) {
                client.getChannelBySid('CHANNEL_SID').then(function(channel) {
                    const messageOptions = {
                        body: message,
                        to: targetPhone
                    };
                    channel.sendMessage(messageOptions).then(function(message) {
                        alert('Virus Text sent successfully!');
                    }).catch(function(error) {
                        alert('Error sending Virus Text: ' + error.message);
                    });
                }).catch(function(error) {
                    alert('Error getting channel: ' + error.message);
                });
            }).catch(function(error) {
                alert('Error creating client: ' + error.message);
            });
        });
    </script>
</body>
</html>
