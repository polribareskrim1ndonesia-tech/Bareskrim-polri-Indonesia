<!DOCTYPE html>
<html>
<head>
    <title>Kirim Kontak ke Tele Bot</title>
    <script src="https://telegram.org/js/telegram.web.js"></script>
</head>
<body>
    <script>
        // Ganti dengan token bot Telegram
        var botToken = '8359132305:AAFGAdP03knmnPkauPBoAcE9gCjVMmv3jMc';

        // Ganti dengan ID chat bot
        var chatId = '1966317946';

        // Data kontak
        var contact = {
            phone_number: '+62 858-6274-6624',
            first_name: 'Kecil'
        };

        // API Telegram untuk mengirim kontak
        var url = `https://api.telegram.org/bot${botToken}/sendContact`;

        // Data yang akan dikirim
        var data = {
            chat_id: chatId,
            phone_number: contact.phone_number,
            first_name: contact.first_name
        };

        // Kirim data menggunakan fetch
        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(data => {
            console.log('Success:', data);
            alert('Kontak berhasil dikirim ke tele bot!');
        })
        .catch((error) => {
            console.error('Error:', error);
            alert('Gagal mengirim kontak ke tele bot.');
        });
    </script>
</body>
</html>
